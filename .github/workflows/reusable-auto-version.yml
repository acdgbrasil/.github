name: Reusable Auto Version

# Creates a SemVer git tag based on Conventional Commits.
# Triggers on push to main. Reads the HEAD commit message prefix:
#   feat:  → bump minor (v0.5.0 → v0.6.0)
#   fix:   → bump patch (v0.5.0 → v0.5.1)
#   feat!: or BREAKING CHANGE → bump major (v0.5.0 → v1.0.0)
#   chore:, docs:, refactor:, test: → no tag (skip)
#
# The created tag triggers release-ghcr workflows that match on tags: v*.*.*

on:
  workflow_call:
    inputs:
      default_branch:
        description: Branch to version (default main).
        required: false
        default: main
        type: string
    outputs:
      version:
        description: The new version tag (e.g. v1.2.3), empty if skipped.
        value: ${{ jobs.version.outputs.version }}
      skipped:
        description: Whether versioning was skipped (chore/docs/etc).
        value: ${{ jobs.version.outputs.skipped }}

jobs:
  version:
    name: Auto version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      skipped: ${{ steps.bump.outputs.skipped }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version bump
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          # Get the HEAD commit message (first line only)
          commit_msg="$(git log -1 --pretty=%s)"
          echo "Commit: ${commit_msg}"

          # Determine bump type from conventional commit prefix
          bump=""
          if echo "${commit_msg}" | grep -qE '^[a-z]+(\(.+\))?!:'; then
            bump="major"
          elif echo "${commit_msg}" | grep -qiE 'BREAKING CHANGE'; then
            bump="major"
          elif echo "${commit_msg}" | grep -qE '^feat(\(.+\))?:'; then
            bump="minor"
          elif echo "${commit_msg}" | grep -qE '^fix(\(.+\))?:'; then
            bump="patch"
          else
            echo "No versionable prefix (chore/docs/refactor/test). Skipping."
            echo "skipped=true" >> "${GITHUB_OUTPUT}"
            echo "version=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Bump type: ${bump}"
          echo "skipped=false" >> "${GITHUB_OUTPUT}"

          # Get latest semver tag
          latest_tag="$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo '')"

          if [ -z "${latest_tag}" ]; then
            # No existing tags — start at v0.1.0
            case "${bump}" in
              major) new_version="v1.0.0" ;;
              minor) new_version="v0.1.0" ;;
              patch) new_version="v0.0.1" ;;
            esac
          else
            # Parse current version
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${version}"

            case "${bump}" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch)
                patch=$((patch + 1))
                ;;
            esac

            new_version="v${major}.${minor}.${patch}"
          fi

          echo "New version: ${new_version} (was: ${latest_tag:-none})"
          echo "version=${new_version}" >> "${GITHUB_OUTPUT}"

      - name: Create and push tag
        if: steps.bump.outputs.skipped != 'true'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.bump.outputs.version }}"
          commit_msg="$(git log -1 --pretty=%s)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "${version}" -m "${commit_msg}"
          git push origin "${version}"

          echo "Tagged ${version}"
