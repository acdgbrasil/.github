name: Secrets Policy Guard

on:
  pull_request:
    branches:
      - main
      - prod

permissions:
  contents: read

jobs:
  validate-secrets-policy:
    name: Validate Bitwarden secrets policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Enforce secrets policy
        shell: bash
        run: |
          set -euo pipefail
          allowed_bw_secret_pattern='ACDG_ORG_BW_SM_ACCESS_TOKEN_(DEV|STG|PROD)'

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          changed_files="$(git diff --name-only "${base_sha}" "${head_sha}")"

          if [[ -z "${changed_files}" ]]; then
            echo "No changed files to validate."
            exit 0
          fi

          echo "Changed files:"
          echo "${changed_files}"

          # Block known token formats in newly added lines.
          if git diff --unified=0 "${base_sha}" "${head_sha}" | grep -E '^\+[^+].*(ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,})' >/dev/null; then
            echo "::error::Detected GitHub PAT/token pattern in added lines. Use Bitwarden Secrets Manager."
            exit 1
          fi

          # Block likely plaintext credential assignments in newly added lines.
          if git diff --unified=0 "${base_sha}" "${head_sha}" \
            | grep -Ei '^\+[^+].*(password|passwd|token|secret|api[_-]?key)[[:space:]]*[:=][[:space:]]*["'"'"']?[A-Za-z0-9_./+=-]{12,}' \
            | grep -Evi '\$\{\{[^}]+\}\}|<secret-id>|ACDG_ORG_BW_SM_ACCESS_TOKEN_(DEV|STG|PROD)' >/dev/null; then
            echo "::error::Detected potential plaintext secret in added lines. Use Bitwarden Secrets Manager."
            exit 1
          fi

          workflow_files="$(echo "${changed_files}" | grep -E '^(\.github/workflows/|workflow-templates/).+\.ya?ml$' || true)"

          if [[ -z "${workflow_files}" ]]; then
            echo "No workflow files changed."
            exit 0
          fi

          while IFS= read -r file; do
            [[ -z "${file}" ]] && continue

            if [[ ! -f "${file}" ]]; then
              continue
            fi

            if grep -Eq '^[[:space:]]*secrets:[[:space:]]*inherit([[:space:]]*#.*)?$' "${file}"; then
              echo "::error file=${file}::Do not use secrets: inherit. Pass only the required secret explicitly."
              exit 1
            fi

            if grep -Eq '\$\{\{[[:space:]]*secrets\.[A-Za-z0-9_]+[[:space:]]*\}\}' "${file}"; then
              if grep -En '\$\{\{[[:space:]]*secrets\.[A-Za-z0-9_]+[[:space:]]*\}\}' "${file}" \
                | grep -Ev "${allowed_bw_secret_pattern}" >/dev/null; then
                echo "::error file=${file}::Only ACDG_ORG_BW_SM_ACCESS_TOKEN_DEV/STG/PROD are allowed under secrets.* in workflows."
                exit 1
              fi
            fi

            if grep -Eq 'bitwarden/sm-action@v2' "${file}"; then
              if ! grep -Eq "access_token:[[:space:]]*\\$\\{\\{[^}]*secrets\\.${allowed_bw_secret_pattern}[^}]*\\}\\}" "${file}"; then
                echo "::error file=${file}::bitwarden/sm-action@v2 must use access_token from ACDG_ORG_BW_SM_ACCESS_TOKEN_DEV/STG/PROD."
                exit 1
              fi
            fi

            if grep -Eq "\\$\\{\\{[[:space:]]*secrets\\.${allowed_bw_secret_pattern}[[:space:]]*\\}\\}" "${file}"; then
              if ! grep -Eq 'bitwarden/sm-action@v2' "${file}"; then
                echo "::error file=${file}::ACDG_ORG_BW_SM_ACCESS_TOKEN_* can only be used with bitwarden/sm-action@v2."
                exit 1
              fi
            fi
          done <<< "${workflow_files}"

          echo "Secrets policy checks passed."
